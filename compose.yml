services:
  modernuo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modernuo_server
    restart: unless-stopped
    ports:
      - "2593:2593"    # Game server (UO client protocol)
      - "8080:8080"    # Web portal (HTTP)
    volumes:
      - ./gamefiles:/gamefiles
      # Map the Configuration folder for easy editing
      - ./configuration:/app/Configuration
      - ./shard:/app/Saves
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    # Tell Docker to allow io_uring system calls
    security_opt:
      - seccomp:unconfined
    stdin_open: true
    tty: true
