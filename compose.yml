# =============================================================================
# compose.yml — Primary deployment using pre-built GitHub Container Registry image
#
# Usage:
#   docker compose up -d
#
# If the GHCR image is unavailable, use compose2.yml instead:
#   docker compose -f compose2.yml up -d
# =============================================================================

services:
  modernuo:
    image: ghcr.io/ferohers/moderntalk:latest
    container_name: modernuo_server
    restart: unless-stopped
    ports:
      - "2593:2593"    # Game server (UO client protocol)
      - "8080:8080"    # Web portal (HTTP - player-facing)
      - "8090:8090"    # Commander API (HTTP - admin-facing)
    volumes:
      - /home/altan/modernuo/gamefiles:/gamefiles
      - ./configuration:/app/Configuration
      - ./shard:/app/Saves
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    security_opt:
      - seccomp:unconfined
    stdin_open: true
    tty: true
