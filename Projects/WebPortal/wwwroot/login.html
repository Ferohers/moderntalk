<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernUO - Login</title>
    <link rel="stylesheet" href="/css/uo-theme.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="site-title">⚔ ModernUO</a>
            <nav class="header-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/register.html" class="nav-link">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <h1 class="auth-title">Sign In</h1>

            <div id="alert" class="uo-alert uo-alert-error hidden"></div>

            <div class="uo-frame">
                <div class="uo-frame-inner">
                    <form id="login-form" onsubmit="return handleLogin(event)">
                        <div class="uo-input-group">
                            <label class="uo-label" for="username">Username</label>
                            <input type="text" id="username" class="uo-input" 
                                   placeholder="Enter your username" 
                                   autocomplete="username" 
                                   required minlength="3" maxlength="30">
                        </div>

                        <div class="uo-input-group">
                            <label class="uo-label" for="password">Password</label>
                            <input type="password" id="password" class="uo-input" 
                                   placeholder="Enter your password" 
                                   autocomplete="current-password" 
                                   required minlength="8" maxlength="128">
                        </div>

                        <div style="text-align: center; margin-top: 1.5rem;">
                            <button type="submit" class="uo-btn uo-btn-primary" id="submit-btn" style="width: 100%;">
                                Enter Britannia
                            </button>
                        </div>

                        <div style="text-align: center; margin-top: 1rem;">
                            <a href="/forgot-password.html" style="color: var(--gold-primary); font-size: 0.9rem;">Forgot your password?</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="auth-footer">
                <p>New to this realm? <a href="/register.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Powered by <a href="https://modernuo.com" target="_blank" rel="noopener">ModernUO</a></p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        (async () => {
            if (await Api.isAuthenticated()) {
                window.location.href = '/dashboard.html';
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('submit-btn');
            
            alertEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const result = await Api.login(username, password);
                if (result.error) {
                    alertEl.textContent = result.error;
                    alertEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Enter Britannia';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                alertEl.textContent = 'An error occurred. Please try again.';
                alertEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Enter Britannia';
            }

            return false;
        }
    </script>
</body>
</html>
