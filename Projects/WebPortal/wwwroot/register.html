<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Hesap Açılışı</title>
    <link rel="stylesheet" href="/css/uo-theme.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="site-title">⚔ ModernUO</a>
            <nav class="header-nav">
                <a href="/" class="nav-link">Ana Sayfa</a>
                <a href="/login.html" class="nav-link">GİRİŞ</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <h1 class="auth-title">Yeni hesap açılışı</h1>

            <div id="alert" class="uo-alert uo-alert-error hidden"></div>

            <div class="uo-frame">
                <div class="uo-frame-inner">
                    <form id="register-form" onsubmit="return handleRegister(event)">
                        <div class="uo-input-group">
                            <label class="uo-label" for="username">Kullanıcı Adı</label>
                            <input type="text" id="username" class="uo-input" 
                                   placeholder="Hesap adını seç" 
                                   autocomplete="username" 
                                   required minlength="3" maxlength="30"
                                   pattern="[^\s<>:\"/\\|?*]+">
                            <div class="uo-input-hint">En az 3 en çok 30 karakter olabilir. Boşluk ve özel karakterler içermemeli.</div>
                        </div>

                        <div class="uo-input-group">
                            <label class="uo-label" for="password">ŞİFRENİ Gir</label>
                            <input type="password" id="password" class="uo-input" 
                                   placeholder="Şifreni oluştur" 
                                   autocomplete="new-password" 
                                   required minlength="8" maxlength="128"
                                   oninput="checkPasswordStrength(this.value)">
                            <div class="password-strength">
                                <div class="password-strength-bar" id="strength-bar"></div>
                            </div>
                            <div class="uo-input-hint" id="strength-text">En az 8 haneli olmalı.</div>
                        </div>

                        <div class="uo-input-group">
                            <label class="uo-label" for="confirm-password">ŞİFRENİ Tekrar GİR</label>
                            <input type="password" id="confirm-password" class="uo-input" 
                                   placeholder="Şifreni tekrarla" 
                                   autocomplete="new-password" 
                                   required minlength="8" maxlength="128">
                        </div>

                        <div class="uo-input-group">
                            <label class="uo-label" for="email">E-posta <span style="color: var(--text-dim); text-transform: none; font-family: var(--font-body);">(opsiyonel)</span></label>
                            <input type="email" id="email" class="uo-input" 
                                   placeholder="sifre@sifirlama.com" 
                                   autocomplete="email" 
                                   maxlength="256">
                        </div>

                        <div style="text-align: center; margin-top: 1.5rem;">
                            <button type="submit" class="uo-btn uo-btn-primary" id="submit-btn" style="width: 100%;">
                                HESAP OLUŞTUR
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="auth-footer">
                <p>Hesaba giriş mi yapacaktın? <a href="/login.html">GİRİŞ</a></p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Gücünü ModernUO'dan almakta.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        (async () => {
            if (await Api.isAuthenticated()) {
                window.location.href = '/dashboard.html';
            }
        })();

        function checkPasswordStrength(password) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            bar.className = 'password-strength-bar';

            if (password.length === 0) {
                text.textContent = 'En az 8 karakter olmalı';
                return;
            }

            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            if (score <= 2) {
                bar.classList.add('strength-weak');
                text.textContent = 'Zayıf — daha zorlu olmasını tavsiye ederiz';
            } else if (score <= 3) {
                bar.classList.add('strength-medium');
                text.textContent = 'Ortalama — daha iyi olabilir';
            } else {
                bar.classList.add('strength-strong');
                text.textContent = 'Güçlü Şifre';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('submit-btn');
            
            alertEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Hesap oluşturuluyor...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const email = document.getElementById('email').value.trim();

            // Client-side validation
            if (password !== confirmPassword) {
                alertEl.textContent = 'Şifreler uyuşmadı';
                alertEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Hesap Aç';
                return false;
            }

            try {
                const result = await Api.register(username, password, confirmPassword, email || undefined);
                if (result.error) {
                    alertEl.textContent = result.error;
                    alertEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                alertEl.textContent = 'Hata oluştu.';
                alertEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }

            return false;
        }
    </script>
</body>
</html>
