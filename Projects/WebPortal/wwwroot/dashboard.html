<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultima Online - Hesap Detayları</title>
    <link rel="stylesheet" href="/css/uo-theme.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="site-title">⚔ ModernUO</a>
            <nav class="header-nav">
                <a href="/" class="nav-link">Ana Sayfa</a>
                <span class="nav-link" style="color: var(--gold-primary);" id="nav-username">Hesap</span>
                <button class="uo-btn uo-btn-sm uo-btn-danger" onclick="handleLogout()">Çıkış</button>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <h1 class="auth-title">Hesap Yönetimi</h1>

        <div id="alert" class="uo-alert hidden"></div>

        <!-- Account Info -->
        <div class="uo-frame" style="margin-bottom: 1.5rem;">
            <div class="uo-frame-inner">
                <h2 style="font-family: var(--font-heading); font-size: 1.1rem; color: var(--gold-primary); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase;">
                    Hesap Bilgileri
                </h2>
                <div class="dashboard-grid" id="account-info">
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Durum</div>
                        <div class="info-value" id="account-status">
                            <span class="spinner"></span> Yükleniyor...
                        </div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Kullanıcı Adı</div>
                        <div class="info-value" id="account-username">—</div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Oluşturulma</div>
                        <div class="info-value" id="account-created">—</div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Son Giriş</div>
                        <div class="info-value" id="account-lastlogin">—</div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Karakterler</div>
                        <div class="info-value" id="account-chars">—</div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">Hesap Tipi</div>
                        <div class="info-value" id="account-access">—</div>
                    </div>
                    <div class="info-card uo-frame-inner" style="background: var(--bg-dark);">
                        <div class="info-label">E-posta</div>
                        <div class="info-value" id="account-email">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Change Password -->
        <div class="uo-frame">
            <div class="uo-frame-inner">
                <h2 style="font-family: var(--font-heading); font-size: 1.1rem; color: var(--gold-primary); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase;">
                    Şifre Değiştir
                </h2>
                <form id="change-password-form" onsubmit="return handleChangePassword(event)">
                    <div class="uo-input-group">
                        <label class="uo-label" for="current-password">Şimdiki Şifren</label>
                        <input type="password" id="current-password" class="uo-input" 
                               placeholder="Şifreni gir" 
                               autocomplete="current-password" 
                               required>
                    </div>

                    <div class="uo-input-group">
                        <label class="uo-label" for="new-password">Yeni Şifre</label>
                        <input type="password" id="new-password" class="uo-input" 
                               placeholder="Yeni şifreni gir" 
                               autocomplete="new-password" 
                               required minlength="8" maxlength="128"
                               oninput="checkPasswordStrength(this.value)">
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strength-bar"></div>
                        </div>
                        <div class="uo-input-hint" id="strength-text">En az 8 karakter olmalı.</div>
                    </div>

                    <div class="uo-input-group">
                        <label class="uo-label" for="confirm-new-password">Yeni şifreni tekrar gir</label>
                        <input type="password" id="confirm-new-password" class="uo-input" 
                               placeholder="Şifreyi tekrar gir" 
                               autocomplete="new-password" 
                               required minlength="8" maxlength="128">
                    </div>

                    <div style="text-align: center; margin-top: 1rem;">
                        <button type="submit" class="uo-btn" id="change-pw-btn">
                            Şifreyi Değiştir
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Change Email -->
        <div class="uo-frame" style="margin-top: 1.5rem;">
            <div class="uo-frame-inner">
                <h2 style="font-family: var(--font-heading); font-size: 1.1rem; color: var(--gold-primary); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase;">
                    E-posta Değiştir
                </h2>
                <form id="change-email-form" onsubmit="return handleChangeEmail(event)">
                    <div class="uo-input-group">
                        <label class="uo-label" for="email-current-password">Şifreni Gir</label>
                        <input type="password" id="email-current-password" class="uo-input"
                               placeholder="Şifreni girmeden eposta değişmez"
                               autocomplete="current-password"
                               required>
                    </div>

                    <div class="uo-input-group">
                        <label class="uo-label" for="new-email">Yeni e-posta adresin</label>
                        <input type="email" id="new-email" class="uo-input"
                               placeholder="Yeni adresini gir"
                               autocomplete="email"
                               required maxlength="256">
                    </div>

                    <div style="text-align: center; margin-top: 1rem;">
                        <button type="submit" class="uo-btn" id="change-email-btn">
                            E-posta Güncelle
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Gücünü ModernUO'dan almakta.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        let currentUsername = null;

        // Check authentication and load account info
        (async () => {
            if (!(await Api.isAuthenticated())) {
                window.location.href = '/login.html';
                return;
            }
            await loadAccountInfo();
        })();

        async function loadAccountInfo() {
            try {
                const info = await Api.getAccountInfo();
                if (info.error) {
                    showAlert(info.error, 'error');
                    return;
                }

                currentUsername = info.username;
                document.getElementById('nav-username').textContent = info.username;
                document.getElementById('account-username').textContent = info.username;
                document.getElementById('account-created').textContent = formatDate(info.created);
                document.getElementById('account-lastlogin').textContent = formatDate(info.lastLogin);
                document.getElementById('account-chars').textContent = `${info.characterCount} / ${info.maxCharacters}`;
                document.getElementById('account-access').textContent = info.accessLevel;
                document.getElementById('account-email').textContent = info.email || 'Girilmemiş';

                const statusEl = document.getElementById('account-status');
                if (info.banned) {
                    statusEl.textContent = 'Banlı';
                    statusEl.className = 'info-value banned';
                } else {
                    statusEl.textContent = 'Aktif';
                    statusEl.className = 'info-value active';
                }
            } catch (err) {
                showAlert('Bilgileri alırken hata oluştu', 'error');
            }
        }

        function checkPasswordStrength(password) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            bar.className = 'password-strength-bar';

            if (password.length === 0) {
                text.textContent = 'En az 8 karakter olmalı';
                return;
            }

            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            if (score <= 2) {
                bar.classList.add('strength-weak');
                text.textContent = 'Zayıf — şifreni güçlendir';
            } else if (score <= 3) {
                bar.classList.add('strength-medium');
                text.textContent = 'Orta — tavsiyemiz daha iyi olabilir';
            } else {
                bar.classList.add('strength-strong');
                text.textContent = 'Güclü şifre';
            }
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('change-pw-btn');

            alertEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Şifre değişiyor ...';

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmNewPassword = document.getElementById('confirm-new-password').value;

            if (newPassword !== confirmNewPassword) {
                showAlert('Yeni şifrelerin uyuşmadı', 'error');
                btn.disabled = false;
                btn.textContent = 'Şifre Değiştir';
                return false;
            }

            try {
                const result = await Api.changePassword(currentPassword, newPassword, confirmNewPassword);
                if (result.error) {
                    showAlert(result.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Change Password';
                } else {
                    showAlert('Şifren değiştirildi', 'success');
                    document.getElementById('change-password-form').reset();
                    document.getElementById('strength-bar').className = 'password-strength-bar';
                    document.getElementById('strength-text').textContent = 'Minimum 8 characters';
                    btn.disabled = false;
                    btn.textContent = 'Change Password';
                }
            } catch (err) {
                showAlert('An error occurred. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Change Password';
            }

            return false;
        }

        async function handleChangeEmail(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('change-email-btn');

            alertEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Güncelleniyor...';

            const currentPassword = document.getElementById('email-current-password').value;
            const newEmail = document.getElementById('new-email').value.trim();

            try {
                const result = await Api.changeEmail(currentPassword, newEmail);
                if (result.error) {
                    showAlert(result.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Update Email';
                } else {
                    showAlert('Email updated successfully!', 'success');
                    document.getElementById('change-email-form').reset();
                    btn.disabled = false;
                    btn.textContent = 'E-posta güncelleme';
                    // Refresh account info to show new email
                    await loadAccountInfo();
                }
            } catch (err) {
                showAlert('Hata oluştu.', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Email';
            }

            return false;
        }

        async function handleLogout() {
            await Api.logout();
            window.location.href = '/';
        }

        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString(undefined, {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateStr;
            }
        }

        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `uo-alert uo-alert-${type === 'error' ? 'error' : 'success'}`;
            alertEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
